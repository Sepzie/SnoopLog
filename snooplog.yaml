# ============================================================
# SnoopLog Configuration
# ============================================================
# High-level settings for your SnoopLog deployment.
# All values are optional — sensible defaults are used.
# ============================================================

# How much log traffic does your app produce?
#   small  — low-volume apps, <1k logs/min
#   medium — moderate traffic, 1k–10k logs/min
#   large  — high-volume services, 10k+ logs/min
volume: small

# When to escalate logs to AI analysis (0.0–1.0)
sensitivity:
  high: 0.7      # above this → deep investigation
  medium: 0.3    # above this → batch triage
  # anything below medium → archived, no LLM call

# Noise filters — set false to keep these log categories
filters:
  debug_level: true
  health_checks: true
  static_assets: true
  k8s_probes: true

# Model persistence
snapshots:
  backend: local       # local | gcs
  gcs_bucket: ""       # required when backend is gcs
