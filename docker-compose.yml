services:
  caddy:
    image: caddy:2
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - snooplog
    depends_on:
      - pipeline
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    expose:
      - "3001"
    ports:
      - "3001:3001"
    volumes:
      - repo-data:/repo:ro
      - pipeline-data:/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - KNOWN_LOG_DB_PATH=/data/known_patterns.db
      - REPO_PATH=/repo
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3003,https://*.vercel.app}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - snooplog
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3003:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001/ws
    depends_on:
      - pipeline
    networks:
      - snooplog
    restart: unless-stopped

  dummy-app:
    build:
      context: ./dummy-app
    ports:
      - "3000:3000"
    expose:
      - "3000"
    volumes:
      - app-logs:/app/logs
    environment:
      - PORT=3000
      - PIPELINE_URL=http://pipeline:3001/api/ingest
    depends_on:
      - pipeline
    networks:
      - snooplog
    restart: unless-stopped

  log-forwarder:
    build:
      context: ./log-forwarder
    volumes:
      - app-logs:/logs:ro
    environment:
      - PIPELINE_URL=http://pipeline:3001/api/ingest
      - LOG_FILE=/logs/app.log
      - SOURCE=dummy-app
    depends_on:
      - pipeline
      - dummy-app
    networks:
      - snooplog
    restart: unless-stopped

  traffic-gen:
    build:
      context: ./traffic-gen
    environment:
      - TARGET_URL=http://dummy-app:3000
      - CHAOS_MODE=${TRAFFIC_CHAOS_MODE:-db-leak}
    depends_on:
      - dummy-app
    networks:
      - snooplog
    restart: unless-stopped

  repo-init:
    image: alpine/git
    volumes:
      - repo-data:/repo
    environment:
      - REPO_URL=${REPO_URL:-https://github.com/FonseLULW/HackathonW2026.git}
    entrypoint: >
      sh -c '
        if [ ! -d /repo/.git ]; then
          echo "Cloning repo..."
          git clone "$$REPO_URL" /repo
        else
          echo "Repo already cloned, skipping."
        fi
      '
    networks:
      - snooplog
    restart: "no"

  repo-sync:
    build:
      context: ./repo-sync
    ports:
      - "3002:3002"
    volumes:
      - repo-data:/repo
    environment:
      - PORT=3002
      - REPO_PATH=/repo
      - REPO_SYNC_BRANCH=${REPO_SYNC_BRANCH:-}
      - REPO_SYNC_SECRET=${REPO_SYNC_SECRET:-}
    depends_on:
      repo-init:
        condition: service_completed_successfully
    networks:
      - snooplog
    restart: unless-stopped

volumes:
  caddy-data:
  repo-data:
  pipeline-data:
  app-logs:

networks:
  snooplog:
    driver: bridge
