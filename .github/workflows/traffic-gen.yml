name: Traffic Generator

on:
  schedule:
    - cron: '0 16 * * *' # Daily at 4 PM UTC — keeps dashboard populated
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'How long to generate traffic (minutes)'
        required: false
        default: '30'

env:
  DUMMY_APP_URL: ${{ secrets.DUMMY_APP_URL != '' && secrets.DUMMY_APP_URL || vars.DUMMY_APP_URL }}

jobs:
  generate-traffic:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Generate organic traffic
        run: |
          set -euo pipefail

          if [ -z "$DUMMY_APP_URL" ]; then
            echo "DUMMY_APP_URL is not configured"
            exit 1
          fi

          # Scheduled runs get 2 minutes; manual runs use the input duration
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DURATION_MIN=2
          else
            DURATION_MIN="${{ inputs.duration_minutes || '30' }}"
          fi
          END_TIME=$(( $(date +%s) + DURATION_MIN * 60 ))

          SKUS=("sku_monitor" "sku_headset" "sku_laptop_stand")
          EMAILS=("alice@example.com" "bob@test.io" "carol@demo.dev" "dave@shop.net" "eve@acme.org")

          # Weighted action picker: browse heavy, orders moderate, selects common
          # 0-39 = browse (40%), 40-74 = select (35%), 75-94 = order (20%), 95-99 = bad request (5%)
          pick_action() {
            local roll=$((RANDOM % 100))
            if   [ $roll -lt 40 ]; then echo "browse"
            elif [ $roll -lt 75 ]; then echo "select"
            elif [ $roll -lt 95 ]; then echo "order"
            else                        echo "error"
            fi
          }

          # Random delay centered around ~10s: 2-20s range
          organic_delay() {
            local roll=$((RANDOM % 100))
            if [ $roll -lt 20 ]; then
              # 20% chance of quick burst (2-5s)
              echo $(( RANDOM % 4 + 2 ))
            elif [ $roll -lt 70 ]; then
              # 50% chance of normal pace (7-13s)
              echo $(( RANDOM % 7 + 7 ))
            else
              # 30% chance of slightly longer gap (14-20s)
              echo $(( RANDOM % 7 + 14 ))
            fi
          }

          REQUEST_NUM=0
          echo "=== Traffic generator started ==="
          echo "Duration: ${DURATION_MIN}m | Target: $DUMMY_APP_URL"
          echo "End time: $(date -d @$END_TIME '+%H:%M:%S %Z' 2>/dev/null || date -r $END_TIME '+%H:%M:%S %Z' 2>/dev/null || echo $END_TIME)"
          echo ""

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            ACTION=$(pick_action)
            REQUEST_NUM=$((REQUEST_NUM + 1))
            ELAPSED=$(( ( $(date +%s) - END_TIME + DURATION_MIN * 60 ) / 60 ))

            case "$ACTION" in
              browse)
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DUMMY_APP_URL/api/products" || echo "000")
                echo "[${ELAPSED}m/${DURATION_MIN}m] #$REQUEST_NUM browse → $STATUS"
                ;;

              select)
                SKU="${SKUS[$((RANDOM % ${#SKUS[@]}))]}"
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  "$DUMMY_APP_URL/api/products/select" \
                  -X POST -H 'Content-Type: application/json' \
                  -d "{\"productId\":\"$SKU\"}" || echo "000")
                echo "[${ELAPSED}m/${DURATION_MIN}m] #$REQUEST_NUM select $SKU → $STATUS"
                ;;

              order)
                SKU="${SKUS[$((RANDOM % ${#SKUS[@]}))]}"
                QTY=$((RANDOM % 3 + 1))
                EMAIL="${EMAILS[$((RANDOM % ${#EMAILS[@]}))]}"
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  "$DUMMY_APP_URL/api/orders" \
                  -X POST -H 'Content-Type: application/json' \
                  -d "{\"productId\":\"$SKU\",\"quantity\":$QTY,\"email\":\"$EMAIL\"}" || echo "000")
                echo "[${ELAPSED}m/${DURATION_MIN}m] #$REQUEST_NUM order $SKU x$QTY → $STATUS"
                ;;

              error)
                ERROR_PAYLOADS=(
                  '{"invalid": true}'
                  '{"productId":"sku_nonexistent","quantity":1,"email":"x@y.com"}'
                  '{"productId":"sku_monitor","quantity":0,"email":"bad"}'
                  '{}'
                )
                PAYLOAD="${ERROR_PAYLOADS[$((RANDOM % ${#ERROR_PAYLOADS[@]}))]}"
                curl -s -o /dev/null "$DUMMY_APP_URL/api/orders" \
                  -X POST -H 'Content-Type: application/json' \
                  -d "$PAYLOAD" || true
                echo "[${ELAPSED}m/${DURATION_MIN}m] #$REQUEST_NUM error payload"
                ;;
            esac

            DELAY=$(organic_delay)
            echo "    sleeping ${DELAY}s..."
            sleep "$DELAY"
          done

          echo ""
          echo "=== Traffic generator finished ==="
          echo "Total requests: $REQUEST_NUM"

      - name: Verify pipeline health
        run: |
          PIPELINE_URL="${{ secrets.PIPELINE_URL != '' && secrets.PIPELINE_URL || vars.PIPELINE_URL }}"
          if [ -n "$PIPELINE_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PIPELINE_URL/health" || echo "000")
            echo "Pipeline health check: $STATUS"
          else
            echo "PIPELINE_URL not set, skipping health check"
          fi
